{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="ru" data-theme="cupcake">

<head>
    <title>Django Tailwind</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        .content h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .content h2 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.75rem;
        }

        .content h3 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .content p {
            margin-bottom: 1rem;
        }

        .content ul {
            list-style: disc;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .content ol {
            list-style: decimal;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .content li {
            margin-bottom: 0.25rem;
        }

        .content strong {
            font-weight: bold;
        }

        .content em {
            font-style: italic;
        }
    </style>
    {% tailwind_css %}
</head>

<body class="min-h-screen grid grid-rows-[auto_1fr_auto]">

    <!-- header -->
    <header class="sticky top-0 z-50">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="max-w-4xl mx-auto px-4 flex w-full">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                            <li><a href="{% url 'courses:courses' %}">Сабақтар</a></li>
                            <li><a href="{% url 'about' %}">Біз жайлы</a></li>
                        </ul>
                    </div>
                    <a href="{% url 'home' %}" class="btn btn-ghost text-xl">NurbekTech</a>
                </div>
                <div class="navbar-center hidden lg:flex">
                    <ul class="menu menu-horizontal px-1">
                        <li><a href="{% url 'courses:courses' %}">Сабақтар</a></li>
                        <li><a href="{% url 'about' %}">Біз жайлы</a></li>
                    </ul>
                </div>
                <div class="navbar-end">
                    <a class="btn">+7 747 778 10 04</a>
                </div>
            </div>
        </div>
    </header>

    <!-- main -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- footer -->
    <footer class="footer sm:footer-horizontal footer-center bg-base-300 text-base-content p-4">
        <aside>
            <p>Copyright © - All right reserved by ACME Industries Ltd</p>
        </aside>
    </footer>

</body>

</html>
