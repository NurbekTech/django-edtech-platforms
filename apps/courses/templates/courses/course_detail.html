{% extends 'base.html' %}

{% block content %}

<section class="bg-base-200 py-12">
    <div class="max-w-4xl mx-auto px-4">

        <!-- Breadcrumbs -->
        <div class="breadcrumbs text-sm mb-6">
            <ul>
                <li><a href="{% url 'courses:courses' %}">Сабақтар</a></li>
                <li><a href="{{ course.category.get_absolute_url }}">{{ course.category.name }}</a></li>
                <li>{{ course.name }}</li>
            </ul>
        </div>

        <div class="text-center">
            <h1 class="text-4xl font-bold mb-3">{{ course.name }}</h1>
            <p class="text-base-content/60">{{ course.description }}</p>
        </div>
    </div>
</section>

<section class="py-12">
    <div class="max-w-4xl mx-auto px-4">
        <div class="flex flex-col gap-4">

            {% for lesson in lessons %}
            <a href="{{ lesson.get_absolute_url }}"
                class="card bg-base-200 shadow-sm hover:shadow-md transition-shadow">
                <div class="card-body">
                    <h2 class="card-title">{{ lesson.order }}. {{ lesson.title }}</h2>
                </div>
            </a>
            {% empty %}
            <p class="text-center text-base-content/60">Әзірше сабақ жоқ</p>
            {% endfor %}

        </div>
    </div>
</section>

{% endblock %}
