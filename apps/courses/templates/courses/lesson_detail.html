{% extends 'base.html' %}

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">

<section class="bg-base-200 py-12">
    <div class="max-w-4xl mx-auto px-4">
        <div class="breadcrumbs text-sm mb-6">
            <ul>
                <li><a href="{% url 'courses:courses' %}">Сабақтар</a></li>
                <li><a href="{{ lesson.course.category.get_absolute_url }}">{{ lesson.course.category.name }}</a></li>
                <li><a href="{{ lesson.course.get_absolute_url }}">{{ lesson.course.name }}</a></li>
                <li>{{ lesson.title }}</li>
            </ul>
        </div>
        <div class="text-center">
            <h1 class="text-4xl font-bold mb-3">{{ lesson.title }}</h1>
        </div>
    </div>
</section>

<section class="py-12">
    <div class="w-full max-w-4xl mx-auto px-4">
        <div class="content w-full min-w-0">
            {{ lesson.content|safe }}
        </div>
    </div>
</section>

<!-- Скриптер ең төменде -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
<script>
    document.querySelectorAll('.content pre').forEach(function (pre) {
        pre.removeAttribute('style');
        pre.style.maxWidth = '100%';
        pre.style.overflowX = 'auto';
    });
    Prism.highlightAll();
</script>

{% endblock %}
